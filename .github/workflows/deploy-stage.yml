name: Deploy to Staging

on:
  push:
    branches: [stage]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      # Deploy to Pages on the `stage` branch, which becomes the preview URL
      # (e.g. https://stage.gopondr.pages.dev). Gate this URL behind a
      # Cloudflare Access policy in the dashboard so only authorized users
      # can reach it — that replaces the old middleware basic-auth.
      - name: Deploy to Cloudflare Pages (Staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=gopondr --branch=stage
          workingDirectory: .
