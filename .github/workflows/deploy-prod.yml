name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Drop middleware so the prod Worker has no request handler —
      # Cloudflare serves prerendered HTML directly from assets, zero Worker
      # CPU. This avoids the intermittent error 1102 ("Worker exceeded
      # resource limits") we hit on the free plan's 10 ms CPU/request
      # budget. Staging deploy keeps middleware.ts intact for basic auth.
      - name: Strip middleware for prod build
        run: rm -f src/middleware.ts

      - name: Build with OpenNext
        run: npx opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: .
